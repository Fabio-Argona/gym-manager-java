name: Deploy para EC2

on:
  push:
    branches:
      - main
      - feature/modernizacao-app

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build do projeto Java
        run: mvn clean package -DskipTests

      - name: Copiar arquivos para EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "target/*.jar,docker-compose.yml,Dockerfile"
          target: "/home/ec2-user/gym-manager/"
          strip_components: 0

      - name: Reiniciar aplicação na EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/gym-manager

            cat > .env <<EOF
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            APP_BASE_URL=${{ secrets.APP_BASE_URL }}
            DDL_AUTO=update
            EOF

            docker compose down
            docker compose up --build -d
            docker image prune -f
            echo "Deploy concluído com sucesso!"
