name: Deploy Backend to AWS EC2

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'gym-manager-java/**'

jobs:
  deploy:
    name: Build & Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR with Maven
        run: |
          cd gym-manager-java
          mvn clean package -DskipTests

      - name: Testar conectividade com EC2
        run: |
          echo "Testando conexão com ${{ secrets.EC2_HOST }} na porta 22..."
          nc -zv -w 10 ${{ secrets.EC2_HOST }} 22 && echo "Porta 22 acessível!" || echo "FALHA: Porta 22 inacessível!"
          # Usuário correto para Amazon Linux é ec2-user

      - name: Copy files to EC2 via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "gym-manager-java/docker-compose.yml,gym-manager-java/Dockerfile,gym-manager-java/target/*.jar,gym-manager-java/uploads"
          target: "~/gym-manager"
          strip_components: 1

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/gym-manager

            # Cria arquivo .env com secrets
            cat > .env <<EOF
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            EOF

            #  Para containers antigos, sobe novamente
            docker compose down
            docker compose up --build -d

            #  Limpa imagens não utilizadas
            docker image prune -f
